name: JavaScript Test Validation Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write   #  required for GHCR

jobs:
  test:
    runs-on: ubuntu-latest

    steps:

      #  Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      #  Debug structure (optional)
      - name: Show repo structure
        run: |
          ls
          ls backend
          ls frontend

      #  Install backend dependencies (with retry)
      - name: Install backend dependencies
        run: |
          cd backend
          for i in 1 2 3; do
            npm ci && break || sleep 10
          done

      #  Ensure Jest exists
      - name: Setup Jest
        run: |
          cd backend
          npm install --save-dev jest || true
          npm pkg set scripts.test="jest"

      #  Run tests
      - name: Run backend tests
        run: |
          cd backend
          NODE_ENV=test npm test

      #  Login to GitHub Container Registry (GHCR)
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      #  Build Docker image
      - name: Build Docker image
        run: |
          cd backend
          docker build -t ghcr.io/${{ github.repository_owner }}/connectblood-backend:latest .

      #  Push Docker image
      - name: Push Docker image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/connectblood-backend:latest
