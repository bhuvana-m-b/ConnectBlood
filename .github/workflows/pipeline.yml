name: JavaScript Test Validation Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      #  Load repo
      - uses: actions/checkout@v4

      #  Debug structure
      - name: Show repo structure
        run: |
          ls
          ls backend
          ls frontend

      #  BACKEND
      
      - name: Install backend dependencies
        run: |
          cd backend
          for i in 1 2 3; do
             npm ci && break || sleep 10
          done


      - name: Setup Jest in backend
        run: |
          cd backend
          npm install --save-dev jest || true
          npm pkg set scripts.test="jest"

      - name: Run backend tests
        run: |
          cd backend
          NODE_ENV=test npm test

     

      

