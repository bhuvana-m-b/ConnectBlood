name: Offline AI JS Pipeline

on:
  workflow_dispatch:
    inputs:
      repo_url:
        required: true
      requirements:
        required: true
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Clean workspace
        run: rm -rf *

      - name: Clone repo
        run: |
          git clone ${{ github.event.inputs.repo_url }} repo

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          cd repo
          npm install || true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Run Pipeline Script
        run: |
          python scripts/pipeline.py "${{ github.event.inputs.requirements }}"

      - name: Run tests
        run: |
          cd repo
          npm test || true

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: updated-repo
          path: repo/
