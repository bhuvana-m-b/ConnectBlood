name: Offline AI JavaScript Pipeline

on:
  workflow_dispatch:
    inputs:
      repo_url:
        description: "GitHub Repo URL"
        required: true
      requirements:
        description: "Feature / Bug Requirement"
        required: true

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      # ✅ Step 1: Check environment
      - name: Check Node and Python
        run: |
          node -v
          python3 --version

      # ✅ Step 2: Clone target repo (IMPORTANT FIX ✅)
      - name: Clone target repo
        run: |
          git clone ${{ github.event.inputs.repo_url }} repo

      # ✅ Step 3: Verify structure
      - name: Debug structure
        run: |
          echo "Controller repo files:"
          ls
          echo "Scripts folder:"
          ls scripts
          echo "Cloned repo:"
          ls repo

      # ✅ Step 4: Install dependencies
      - name: Install dependencies
        run: |
          cd repo
          npm install || true

      # ✅ Step 5: Run your pipeline script
      - name: Run Offline Pipeline
        run: |
          python3 scripts/pipeline.py "${{ github.event.inputs.requirements }}"

      # ✅ Step 6: Setup Jest
      - name: Setup Jest
        run: |
          cd repo
          npm install --save-dev jest || true
          npm pkg set scripts.test="jest"

      # ✅ Step 7: Run tests
      - name: Run tests
        run: |
          cd repo
          npm test || true

      # ✅ Step 8: Upload updated repo
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: updated-repo
          path: repo/
