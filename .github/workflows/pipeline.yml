name: Offline AI JavaScript Pipeline

on:
  workflow_dispatch:
    inputs:
      repo_url:
        required: true
      requirements:
        required: true

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      # ✅ Clean workspace
      - name: Clean workspace
        run: rm -rf *

      # ✅ Clone repo
      - name: Clone repository
        run: git clone ${{ github.event.inputs.repo_url }} repo

      # ✅ Verify Node & Python (already installed)
      - name: Check Node & Python versions
        run: |
          node -v
          python3 --version

      # ✅ Install dependencies
      - name: Install dependencies
        run: |
          cd repo
          npm install || true

      # ✅ Run offline pipeline
      - name: Run Pipeline Script
        run: |
          python3 scripts/pipeline.py "${{ github.event.inputs.requirements }}"

      # ✅ Setup Jest manually
      - name: Setup Jest
        run: |
          cd repo
          npm install --save-dev jest || true
          npm pkg set scripts.test="jest"

      # ✅ Run tests
      - name: Run Tests
        run: |
          cd repo
          npm test || true

      # ✅ Upload result
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: updated-repo
          path: repo/
